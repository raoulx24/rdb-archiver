source:
  path: "/tmp/rdb-archive/source"
  primaryName: "dump.rdb"
  auxNames:
  - "nodes.conf"
  watchMode: "fsnotify"          # auto | poll | fsnotify

destination:
  root: "/tmp/rdb-archive/dest"
  subDir: "$(HOSTNAME)"
  snapshotSubdir: "snapshots"
  retention:
    lastCount: 6
    removeUnknownFolders: true
    rules:
    - name: "daily"
      cron: "0 0 * * *"
      count: 7
    - name: "weekly"
      cron: "0 0 * * 0"
      count: 4

watchFS:
  fsnotify:
    debounceWindow: "200ms"
  pool:
    interval: "5s"
  stabilityWindow: "200ms"

fs:
  maxRetries: 7
  retryBase: "50ms"
  retryDurationCap: "1s"
  compressionLevel: 2

logging:
  level: "info"     # debug | info | warn | error
  format: "json"    # json | text

health:
  port: 8080

configReload:
  enabled: true
  method: "fsnotify"
